# DMS — API Service
#
# Connects to shared PostgreSQL + Redis from ~/infra/shared/.
# No bundled database containers.
#
# Usage (standalone):
#   docker compose -f docker-compose.api.yml up -d
#   docker compose -f docker-compose.api.yml down
#
# Requires:
#   - shared-postgres and shared-redis running (~/infra/shared/)
#   - Docker network 'shared-db' exists

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  api:
    image: ${API_IMAGE:-dms-api:local}
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: dms-api
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - ../../apps/api/.env
    environment:
      - DATABASE_URL=postgresql://${PG_USER:-dms_dev}:${PG_PASSWORD:-dms_dev}@${PG_HOST:-shared-postgres}:5432/${PG_DATABASE:-dms_dev}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@${REDIS_HOST:-shared-redis}:6379/${REDIS_DB:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 10s
      start_period: 40s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
    networks:
      - default
      - shared-db
    labels:
      - "logging=promtail"
      - "service=dms-api"

networks:
  shared-db:
    external: true
